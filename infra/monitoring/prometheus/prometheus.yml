global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ull_engine'
    # targets: change depending on docker networking
    # if using Docket Desktop or an environment where host.docker.internal resolves from container:
    static_configs:
      - targets: ['etrade-dev:9100']
    
    # if you instead use docker-compose with network_mode: host (Linux), Prmetheus can scrape 127.0.0.1:9100
    # static_configs:
    #   - targets: ['127.0.0.1:9100']